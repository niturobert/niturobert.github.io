<script>
function JSIncluder() {
	console.log("[JS Includer] initialization...")
	let elements = document.getElementsByTagName("include")
	for (let i = 0; i < elements.length; i++) {
		let currentElement = elements[i]
		let pageHTTPLink = currentElement.getAttribute("src")
		if (!pageHTTPLink) {
			console.error("[JS Includer] Missing required paramterer: src")
			continue;
		}

		let request = new XMLHttpRequest()
		request.onreadystatechange = function() {
			if (this.readyState == XMLHttpRequest.DONE) {
				if (this.status == 200) {
					console.log("[JS Includer] Loaded %s", this.responseURL)
					currentElement.innerHTML = this.responseText
				} else {
					console.error("[JS Includer] Status is not 200")
				}
			}
		}

		request.open("GET", pageHTTPLink, true)
		request.send()

		console.log("[JS Includer] Loading " + pageHTTPLink)
	}
}

window.onload = function() {
	JSIncluder()
}
</script>
